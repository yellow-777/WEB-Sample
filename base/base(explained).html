<!DOCTYPE html>
  <!--
    ・ドキュメントタイプ宣言
      https://www.tohoho-web.com/html/doctype.htm
    ・"!DOCTYPE"が大文字である理由：
      ・SGML（HTMLの祖先）やXMLでは、構文キーワードは大文字が標準だった。
      ・HTML5では「小文字でもいい」が、後方互換のために大文字を踏襲してる。
      
    ・XHTML化：XMLに基づいた厳密なHTML。開発者の負担軽減で廃止→HTML5へ。
      →【厳密な構文より、シャープに書くことで可読性を上げていくべき？】
      https://ja.m.wikibooks.org/wiki/HTML/XHTML1.0
  -->
<html lang="ja">
  <!-- 
    要素内で使用されている言語を指定。
    https://qiita.com/ryichk/items/70e325f69002ddc20aed
  -->
<head>
  <meta charset="UTF-8">
  <!--
    日本語の文字コード指定。（マルチバイト文字）
    https://creatorquest.jp/lessons/html/meta-character/
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <!--
      name="viewport"	ビューポートの設定を行うことを示す
      content="..."	ビューポートの具体的な設定内容
      width=device-width	表示幅を**端末の画面幅（デバイス幅）**に合わせる。(CSSピクセル数指定可)
      initial-scale=1	ページを最初に読み込んだときの表示倍率を **1倍（ズームなし）**にする（0.1～10、d:1）
      https://developer.mozilla.org/ja/docs/Web/HTML/Guides/Viewport_meta_element
      https://developer.mozilla.org/ja/docs/Web/HTML/Reference/Attributes/content
      https://developer.mozilla.org/ja/docs/Web/HTML/Reference/Elements/meta/name
    -->
  <title>サンプルWebサイト</title>
    <!--
      ページタブ・題名バーの表示。TEXTのみ。
      https://developer.mozilla.org/ja/docs/Web/HTML/Reference/Elements/title
    -->
  <link rel="stylesheet" href="style.css">
    <!--
      
      https://developer.mozilla.org/ja/docs/Web/HTML/Reference/Elements/link
    -->
</head>

<body>
  <!-- テキストコンテンツ -->
  <!-- 見出しタグ -->
  
  <h1>h1タグサンプル</h1>
  <h2>h2タグサンプル</h2>
  <h3>h3タグサンプル</h3>
  <h4>h4タグサンプル</h4>
  <h5>h5タグサンプル</h5>
  <h6>h6タグサンプル</h6>
  
  <header>
    <h1>ようこそ</h1>
    <p>これはサンプルウェブサイトです。</p>
  </header>

  <main>
    <section>
      <h2>プロフィール</h2>
      <p>ここに自己紹介を書くことができます。</p>
    </section>
  </main>

  <table border=1>
    <tr>
      <th>動物</th>
      <td>ネコ</td>
      <td>イヌ</td>
      <td>クマ</td>
    </tr>
    <tr>
      <th>昆虫</th>
      <td>カマキリ</td>
      <td>タガメ</td>
      <td>オニヤンマ</td>
    </tr>
    <tr>
      <th>キノコ</th>
      <td>シイタケ</td>
      <td>シメジ</td>
      <td>エノキ</td>
    </tr>
  </table>

  <footer>
    <p>&copy; 2025 太郎</p>
  </footer>

</body>

</html>
